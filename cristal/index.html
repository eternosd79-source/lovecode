<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propuesta de Cristal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- AURORA BACKGROUND (Puro CSS animado) -->
    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- CAPA DE PARTÍCULAS ORGÁNICAS (Reemplaza los emojis) -->
    <canvas id="particlesCanvas"></canvas>

    <!-- PANTALLA INTRODUCTORIA (EL VELO) -->
    <div class="intro-screen" id="introScreen">
        <h1 class="intro-text" id="i_t1">Todo este tiempo...</h1>
        <h2 class="intro-text" id="i_t2">He querido decirte algo.</h2>
        <button class="btn-reveal hidden" id="btnRevealIntro">Escuchar</button>
    </div>

    <!-- TARJETA GLASSMORPHISM DE LUJO -->
    <div class="glass-container hidden-start" id="glassContainer">
        <div class="glass-card">
            <h1 class="main-question">¿Quieres ser mi novia?</h1>
            <div class="divider"></div>
            <p class="subtitle">Eres mi sol, mi luna y todas mis estrellas</p>

            <div class="button-wrapper">
                <button class="btn btn-yes" id="btnYes">¡Sí, quiero! ✨</button>
                <button class="btn btn-no" id="btnNo">Lo dudo</button>
            </div>
        </div>
    </div>

    <!-- CLÍMAX DE VICTORIA LUMINOSO -->
    <div class="success-screen" id="successScreen">
        <!-- Efecto destello central -->
        <div class="nova-flare"></div>
        <h1 class="climax-title" id="c_t1">Era el destino.</h1>
        <h2 class="climax-sub" id="c_t2">Prometo hacerte inmensamente feliz...</h2>
        <p class="climax-bottom" id="c_t3">Para siempre. 🤍</p>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../ventas/personalizar.js"></script>
</body>
</html>
